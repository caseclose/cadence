# Supabase Edge Function config for Cadence push-due.
# Deploy with: supabase functions deploy push-due

[functions.push-due]
verify_jwt = false
# Browser test calls authenticate with the user JWT; scheduled calls use the
# independent CADENCE_CRON_SECRET checked inside the function.


# Called only by pg_cron with the independent secret verified in the function.
[functions.daily-digest]
verify_jwt = false
